# Serves only /news.json for the data subdomain. Put Cloudflare (proxied/orange
# cloud) in front for HTTPS + CDN; SSL mode "Flexible" works since this file is
# public and carries no secrets (upgrade to Full + a Cloudflare Origin Cert if
# you want CF-to-origin encryption).
server {
    listen 80;
    listen [::]:80;
    server_name data.newsphere.live;

    root /var/www/newsphere-data;

    location = /news.json {
        # Allow the main site (newsphere.live) to fetch this cross-origin.
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Expose-Headers "ETag" always;
        # Let clients/CDN cache briefly; data only changes every ~15 min.
        add_header Cache-Control "public, max-age=60" always;
        default_type application/json;
        try_files /news.json =404;
    }

    # Nothing else is served here.
    location / { return 404; }
}
