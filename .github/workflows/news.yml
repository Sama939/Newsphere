name: Update news markers

# Regenerates public/data/news.json on a schedule and pushes it. Because
# Cloudflare Pages auto-deploys on every push to the repo, the live site picks
# up the fresh data automatically. The pipeline needs Node (main script) plus
# Python + transformers/torch + sentencepiece (self-hosted EN→ZH translation
# and semantic dedup), so we install and cache those here.
on:
  schedule:
    - cron: '17 */3 * * *' # every 3 hours (offset off the hour). Lower if you want fresher data; watch CI/Pages quotas.
  workflow_dispatch: {} # lets you run it manually from the Actions tab

permissions:
  contents: write

concurrency:
  group: news-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Cache pip wheels and the downloaded Hugging Face models so subsequent
      # runs don't re-download torch (~200MB) and the opus-mt / MiniLM models.
      - name: Cache pip + Hugging Face models
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/huggingface
          key: news-ml-${{ runner.os }}-v1

      - name: Install Python deps (CPU-only torch)
        run: |
          python -m pip install --upgrade pip
          pip install transformers sentencepiece
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Fetch, rank, translate GDELT events
        run: node scripts/fetch-news.mjs

      - name: Commit updated news.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/news.json
          git diff --staged --quiet || git commit -m "chore: update news data [skip ci]"
          git push
