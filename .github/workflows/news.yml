name: Update news markers

# Free, decoupled auto-update: regenerate news.json every ~15 minutes and upload
# it to Cloudflare R2 (object storage). The site fetches from R2, so updating
# data NEVER triggers a Cloudflare Pages rebuild — which keeps us under the Pages
# free build quota and lets us refresh as often as GDELT itself updates.
#
# Requirements:
#   * Public repo  → unlimited free Actions minutes (private = 2000/mo, too few
#     for every-15-min runs).
#   * Repo secrets: R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_ENDPOINT, R2_BUCKET
#   * See docs/auto-update.md for the full setup.
on:
  schedule:
    - cron: '*/15 * * * *' # GDELT's cadence. GitHub may delay scheduled runs under load.
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: news-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip + Hugging Face models
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/huggingface
          key: news-ml-${{ runner.os }}-v1

      - name: Install Python deps (CPU-only torch)
        run: |
          python -m pip install --upgrade pip
          pip install transformers sentencepiece
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Generate news.json
        run: node scripts/fetch-news.mjs

      - name: Upload to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          aws s3 cp public/data/news.json "s3://${R2_BUCKET}/news.json" \
            --endpoint-url "${R2_ENDPOINT}" \
            --content-type application/json \
            --cache-control "public, max-age=60"
