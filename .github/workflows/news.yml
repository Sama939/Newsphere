name: Update news markers

on:
  schedule:
    - cron: '7 * * * *' # every hour, offset to avoid the top-of-hour rush
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch and rank GDELT events
        run: node scripts/fetch-news.mjs

      - name: Commit updated news.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/news.json
          git diff --staged --quiet || git commit -m "chore: update news data"
          git push
