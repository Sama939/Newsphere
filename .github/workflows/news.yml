name: Update news markers

# NOTE: auto-schedule is intentionally disabled. This job only installs Node,
# but the pipeline also needs Python + transformers/torch + sentencepiece for
# self-hosted translation and semantic dedup. Without them those steps are
# skipped, producing English-only, un-deduped data — which would overwrite the
# good data on every run. Until the workflow is upgraded to install the Python
# deps (with model caching), refresh data locally (`node scripts/fetch-news.mjs`)
# or trigger this manually. See deployment notes.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch and rank GDELT events
        run: node scripts/fetch-news.mjs

      - name: Commit updated news.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/news.json
          git diff --staged --quiet || git commit -m "chore: update news data"
          git push
