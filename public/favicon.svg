    <ellipse cx="32" cy="32" rx="12.5" ry="24"/>
    <line x1="32" y1="8" x2="32" y2="56"/>
    <path d="M9 24 H55" opacity="0.85"/>
    <path d="M9 40 H55" opacity="0.85"/>
    <path d="M14 16 H50" opacity="0.55"/>
    <path d="M14 48 H50" opacity="0.55"/>
  </g>
  <circle cx="32" cy="32" r="24" fill="none" stroke="#7fd9ff" stroke-width="1.6" opacity="0.9"/>
  <!-- live news markers -->
  <circle cx="42" cy="22" r="3.6" fill="#e63946"/>
  <circle cx="42" cy="22" r="3.6" fill="#e63946" opacity="0.45">
    <animate attributeName="r" values="3.6;7;3.6" dur="2s" repeatCount="indefinite"/>
