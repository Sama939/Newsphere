<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <radialGradient id="space" cx="78%" cy="18%" r="90%">
      <stop offset="0%" stop-color="#1a2742"/>
      <stop offset="55%" stop-color="#0a1120"/>
      <stop offset="100%" stop-color="#04070e"/>
    </radialGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255,226,170,0.45)"/>
      <stop offset="100%" stop-color="rgba(255,226,170,0)"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7fd9ff"/>
      <stop offset="55%" stop-color="#eaf2ff"/>
      <stop offset="100%" stop-color="#ffd8a8"/>
    </linearGradient>
    <radialGradient id="globebg" cx="42%" cy="36%" r="70%">
      <stop offset="0%" stop-color="#16243f"/>
      <stop offset="100%" stop-color="#070b16"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#space)"/>
  <circle cx="1020" cy="90" r="360" fill="url(#sun)"/>

  <!-- globe -->
  <g transform="translate(880 315)">
    <circle r="210" fill="url(#globebg)" stroke="#7fd9ff" stroke-width="2.5" opacity="0.95"/>
    <g fill="none" stroke="#7fd9ff" stroke-width="1.5" opacity="0.55">
      <ellipse rx="84" ry="208"/>
      <ellipse rx="150" ry="208"/>
      <line x1="0" y1="-210" x2="0" y2="210"/>
      <path d="M-205 -70 H205"/>
      <path d="M-205 70 H205"/>
      <path d="M-180 -135 H180"/>
      <path d="M-180 135 H180"/>
    </g>
    <!-- live markers -->
    <circle cx="70" cy="-90" r="11" fill="#e63946"/>
    <circle cx="70" cy="-90" r="11" fill="#e63946" opacity="0.4"/>
    <circle cx="-60" cy="40" r="8" fill="#ffd8a8"/>
    <circle cx="30" cy="120" r="7" fill="#80ed99"/>
    <circle cx="-110" cy="-30" r="7" fill="#4cc9f0"/>
    <circle cx="120" cy="60" r="6" fill="#f9c74f"/>
  </g>

  <!-- text -->
  <text x="90" y="250" font-size="92" font-weight="800" fill="url(#title)">🌍 Newsphere</text>
  <text x="92" y="320" font-size="40" font-weight="500" fill="#c8d8f0">The world's news, live on a globe.</text>
  <text x="92" y="380" font-size="27" fill="#8fa3cc">Conflict · Sports · Culture · Tech — ranked by severity, in real time.</text>
  <text x="92" y="560" font-size="24" fill="#6b7a9a">newsphere.live</text>
</svg>
